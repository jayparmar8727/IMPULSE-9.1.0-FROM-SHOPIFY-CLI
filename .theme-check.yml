# KW custom layer — silence expected, unavoidable warnings on our own files.
# Additive dev-tooling config only: no Liquid/CSS/JS changes, stock files untouched,
# not pushed to the store. All other checks/files keep their defaults.
#
# ── Top-level ignore: skip the STOCK files that carry pre-existing Impulse offenses ──
# `shopify theme check` reports 351 offenses, ALL of them in 82 STOCK files exactly as
# Shopify's CLI shipped Impulse 9.1.0 — ZERO in our kw/custom code. We never lint stock
# (fixing these would mean editing stock files, forbidden by our golden rules), and most
# are Shopify's own false positives (ico-*.svg.liquid <?xml?>, gift_card HTML parse,
# pt-*.schema.json). Skipping these exact files makes the report read ~0, so any NEW
# offense in OUR custom code stands out immediately. Custom files are deliberately NOT
# listed here, so they stay fully checked.
# REVERSIBLE: delete this `ignore:` block to see stock offenses again.
# REGENERATE after an Impulse upgrade: `shopify theme check --output json`, then re-list the
# offending stock paths (custom = kw-* + the 25 manifest sections; never add those here).
# NOTE: layout/theme.liquid is stock but carries our tiny foundation <head> edits; its 3
# offenses are stock-origin, so it's ignored here too (those edits won't be linted — accepted).
ignore:
  - "assets/ico-select-drawer.svg.liquid"
  - "assets/ico-select-footer.svg.liquid"
  - "assets/ico-select-menu.svg.liquid"
  - "assets/ico-select-white.svg.liquid"
  - "assets/ico-select.svg.liquid"
